version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: mindspring_web:latest
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data

  db:
    image: mariadb:10.3.39
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: mindspring
      MYSQL_USER: mindspring
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
      - ./queries.sql:/docker-entrypoint-initdb.d/queries.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db_data:
